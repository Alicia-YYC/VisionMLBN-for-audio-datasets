# This is to create a dummy environment for development, so IDEs can find the packages.
# You should never use this environment to run code.
channels:
  - pytorch
  - nvidia
  - conda-forge

channel_priority: strict

dependencies:
  - python=3.11
  - pip
  - pytorch=2.5.1
  - pytorch-cuda=12.4
  - numpy<2.0
  - timm
