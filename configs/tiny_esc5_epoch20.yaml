model: tiny
seed: 42

# dataset
dataset_path: /shared/data/processed_esc5/
input_size: 224

# training
epochs: 20
batch_size: 8
lr: 0.0003
min_lr: 0.00001
weight_decay: 0.08
warmup_epochs: 1
plateau_epochs: 0
mid_lr: 0.0001
mid_lr_epoch: 8
num_workers: 0
max_grad_norm: 1.0
gradient_accumulation_steps: 1
patience: 5
lr_reduce_factor: 0.8
lr_reduce_patience: 2

# DDP / AMP / aug
use_ddp: false
use_amp: false
use_tf32: false
amp_dtype: bf16
repeated_aug: 1

# mixup
use_mixup: false
mixup_alpha: 0.2
cutmix_alpha: 1.0
mixup_prob: 0.5
mixup_stop_epoch: 9999
fused_optimizer: false

# ema
use_ema: false
ema_decay: 0.9999
ema_start_epoch: 0

# loss / regularization
cudnn_benchmark: false
label_smoothing: 0.1
symmetry_weight: 0.00
drop_path_rate: 0.1
use_tensorboard: false
use_strong_augmentation: false

# tta / swa
use_tta: false
tta_level: light
use_swa: false
swa_start_epoch: 40
swa_freq: 1

# output
save_dir: /home/yuechen/packages/signal/outputs/debug_run_esc5
log_dir: /home/yuechen/packages/signal/logs/debug_run_esc5
